name: Build

on:
  workflow_dispatch:
    inputs:
      release:
        required: false
        type: boolean
        description: Publish a new release
        default: false
  push:
    branches: [ "**" ]
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

env:
  ORG_GRADLE_PROJECT_is_release: ${{ github.event_name == 'workflow_dispatch' && inputs.release }}

jobs:
  build:
    # Only run on PRs if the source branch is on someone else's repo
    if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:

      - name: "Checkout Repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Set up JDK 25"
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: "temurin"

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "Build Artifact"
        id: build
        run: |
          echo "ORG_GRADLE_PROJECT_build_timestamp=$(date --iso-8601=seconds)" >> "$GITHUB_ENV"
          ./gradlew build -x spotlessCheck
          ./gradlew spotlessCheck
          version="$(./gradlew properties -q | grep '^version:' | cut -d ':' -f 2 | xargs)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "Upload Test Results"
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: |
            **/build/test-results/test/TEST-*.xml
            **/build/reports/

      - name: "Upload Mindustry Jar"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: "imperium-mindustry/build/libs/imperium-mindustry.jar"
          archive: false
          if-no-files-found: error

      - name: "Upload Backend Jar"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: "imperium-backend/build/libs/imperium-backend.jar"
          archive: false
          if-no-files-found: error

      - name: "Create Release"
        if: ${{ env.ORG_GRADLE_PROJECT_is_release == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          name: "Build v${{ steps.build.outputs.version }}"
          tag_name: "v${{ steps.build.outputs.version }}"
          files: |
            imperium-mindustry/build/libs/imperium-mindustry.jar
            imperium-backend/build/libs/imperium-backend.jar

      - name: "Bump Version"
        if: ${{ env.ORG_GRADLE_PROJECT_is_release == 'true' }}
        run: echo "${{ steps.build.outputs.version }}" > VERSION.txt

      - name: "Post Build Changes"
        if: ${{ env.ORG_GRADLE_PROJECT_is_release == 'true' }}
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "chore: Post v${{ steps.build.outputs.version }} changes"
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: "VERSION.txt"

  event-file:
    if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
    name: "Event File"
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:

      - name: "Upload Event File"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: event-file
          path: ${{ github.event_path }}
